name: HUSAI-OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  meta-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate structure
        run: |
          test -f README.md
          test -f HUSAI_AGENT.md
          test -f docs/memory.md
          test -d agents
          test -d projects
          test -d docs

  restaurant-os:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: restaurant-os/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci
