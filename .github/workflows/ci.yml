name: HUSAI-OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  meta-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate structure
        run: |
          test -f README.md
          test -f HUSAI_AGENT.md
          test -f docs/memory.md
          test -f projects/registry.json
          test -d agents
          test -d husai-dashboard

  husai-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: husai-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: husai-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  restaurant-os:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: restaurant-os/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci

  trading-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trading-ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trading-ai/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  dropshipping-research:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dropshipping-research
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dropshipping-research/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
